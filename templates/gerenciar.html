<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="templates/style.css">
    <title>SensorGrid — Gerenciar</title>
</head>
<body>

<header id="header-principal">
    <a href="/" class="logo">⬡ SensorGrid</a>
    <nav>
        <a href="/" class="nav-link">Criar Sensor</a>
        <a href="/gerenciar" class="nav-link ativo">Gerenciar</a>
    </nav>
</header>

<div id="view-grid">
    <div class="gerenciar-toolbar">
        <div class="filtros-wrap">
            <div class="filtro-grupo">
                <span class="filtro-label">AMBIENTE</span>
                <button class="filtro-btn ativo" onclick="filtrarModo('todos', this)">Todos</button>
                <button class="filtro-btn" onclick="filtrarModo('externo', this)">🌿 Externo</button>
                <button class="filtro-btn" onclick="filtrarModo('estufa', this)">🏠 Estufa</button>
            </div>
            <div class="filtro-grupo">
                <span class="filtro-label">TIPO</span>
                <button class="filtro-btn ativo" onclick="filtrarTipo('todos', this)">Todos</button>
                <button class="filtro-btn" onclick="filtrarTipo('temp', this)">🌡 Temperatura</button>
                <button class="filtro-btn" onclick="filtrarTipo('umid', this)">💧 Umidade</button>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
            <div class="stats" id="stats-bar"></div>
            <button class="btn-leitura-geral" onclick="leituraGeral()">Realizar leitura</button>
        </div>
    </div>

    <div class="grid" id="sensor-grid"></div>

    <div class="empty-state hidden" id="empty-state">
        <div class="empty-icon">◎</div>
        <p>Nenhum sensor encontrado.</p>
        <a href="/">Criar sensor</a>
    </div>
</div>

<div id="view-detalhe" class="hidden"></div>

<script src="templates/script.js"></script>
</body>
</html>
