<!DOCTYPE html>
<html lang="pt-br" data-modo="externo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SensorGrid</title>
</head>
<body>

<header>
    <span class="logo">SensorGrid</span>
    <div class="toggle-modo">
        <button id="btn-externo" class="toggle-btn ativo" onclick="trocarModo('externo')">🌿 Externo</button>
        <button id="btn-estufa" class="toggle-btn" onclick="trocarModo('estufa')">🏠 Estufa</button>
    </div>
    <nav>
        <a href="/" class="nav-link ativo">Sensores</a>
        <a href="/gerenciar" class="nav-link">Gerenciar</a>
    </nav>
</header>

<div id="view-grid">
    <div class="grid" id="sensor-grid"></div>
    <div class="empty-state hidden" id="empty-state">
        <p>Nenhum sensor para este ambiente.</p>
        <a href="/gerenciar">Criar sensor</a>
    </div>
</div>

<div id="view-detalhe" class="hidden"></div>

<script src="script.js"></script>
</body>
</html>
